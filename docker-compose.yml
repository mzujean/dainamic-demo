version: '3.8'
services:
  dainamic:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development

  whatsapp-bot:
    build: ./whatsapp-bot
    volumes:
      - ./whatsapp-bot:/app
      - /app/node_modules
      - ./whatsapp-bot/session:/app/session
    env_file:
      - ./whatsapp-bot/.env
    restart: unless-stopped
